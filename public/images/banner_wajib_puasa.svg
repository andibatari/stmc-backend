<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Latar Belakang Khusus Waspada -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5F5"/>
      <stop offset="100%" stop-color="#FED7D7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad2)" rx="25"/>
  
  <!-- Garis Tepi Putus-putus Estetik -->
  <rect x="15" y="15" width="770" height="420" fill="none" stroke="#E53E3E" stroke-width="2" stroke-dasharray="8 6" rx="16" opacity="0.5"/>

  <!-- Label Peringatan -->
  <g transform="translate(40, 40)">
    <rect width="110" height="30" rx="6" fill="#C00000"/>
    <text x="16" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" letter-spacing="1">PENTING!</text>
  </g>

  <!-- Judul Utama Infografis -->
  <text x="40" y="120" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#9B2C2C">WAJIB PUASA 10 - 12 JAM</text>
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2D3748">Persiapan Utama Sebelum Pelaksanaan Pengukuran MCU</text>

  <!-- Teks Poin Aturan -->
  <g transform="translate(40, 215)" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4A5568">
    <!-- Poin 1 -->
    <circle cx="10" cy="10" r="6" fill="#C00000"/>
    <text x="28" y="16">Hanya diperbolehkan mengonsumsi air putih selama masa puasa.</text>
    
    <!-- Poin 2 -->
    <circle cx="10" cy="65" r="6" fill="#C00000"/>
    <text x="28" y="71">
      <tspan x="28" dy="0">Hindari makanan manis, tinggi lemak, dan begadang semalam</tspan>
      <tspan x="28" dy="24">sebelumnya.</tspan>
    </text>
    
    <!-- Poin 3 -->
    <circle cx="10" cy="135" r="6" fill="#C00000"/>
    <text x="28" y="141">Mulai puasa tepat waktu sesuai dengan instruksi shift kerja Anda.</text>
  </g>

  <!-- 🌟 Ikon Kombinasi Jam & Darah (Digeser sedikit ke Kiri agar pas di tengah kanan) 🌟 -->
  <g transform="translate(570, 150)">
    <!-- Jam Dinding Flat -->
    <circle cx="100" cy="100" r="80" fill="#FFFFFF" stroke="#E53E3E" stroke-width="6" style="filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.08));"/>
    <!-- Jarum Jam -->
    <path d="M100,45 L100,100 L145,100" fill="none" stroke="#2D3748" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Garis Penunjuk Jam -->
    <line x1="100" y1="25" x2="100" y2="35" stroke="#E53E3E" stroke-width="4"/>
    <line x1="100" y1="165" x2="100" y2="175" stroke="#E53E3E" stroke-width="4"/>
    <line x1="25" y1="100" x2="35" y2="100" stroke="#E53E3E" stroke-width="4"/>
    <line x1="165" y1="100" x2="175" y2="100" stroke="#E53E3E" stroke-width="4"/>

    <!-- Tetesan Darah Laboratorium -->
    <g transform="translate(130, 110)">
      <circle cx="35" cy="35" r="40" fill="#FFFFFF" style="filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.15));"/>
      <path d="M35,15 C35,15 55,38 55,48 C55,59 46,65 35,59 C24,65 15,59 15,48 C15,38 35,15 35,15 Z" fill="#C00000"/>
      <path d="M26,46 C26,41 30,35 30,35" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Kotak Catatan Kaki Bawah -->
  <rect x="40" y="375" width="560" height="40" rx="8" fill="#FFF5F5" stroke="#FEB2B2" stroke-width="1"/>
  <text x="55" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C00000">⚠️ Kelalaian masa puasa dapat mempengaruhi akurasi hasil laboratorium Anda.</text>
</svg>
